<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            padding-bottom: 80px;
        }

        .tab-content {
            display: none;
        }

        .tab-active {
            display: block;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans">

    <div id="setup-screen"
        class="fixed inset-0 bg-gray-50 z-[100] flex flex-col items-center justify-center p-6 hidden">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Выберите вашу группу</h2>
        <div id="group-list" class="w-full space-y-3"></div>
    </div>

    <div id="tab-schedule" class="tab-content tab-active p-4">
        <h1 class="text-xl font-bold mb-4">Расписание</h1>
        <div class="flex bg-gray-200 p-1 rounded-lg mb-4">
            <button onclick="filterSchedule('today')" id="btn-today"
                class="flex-1 py-1 text-sm font-semibold bg-white rounded-md shadow">Сегодня</button>
            <button onclick="filterSchedule('week')" id="btn-week" class="flex-1 py-1 text-sm font-semibold">На
                неделю</button>
        </div>
        <div id="schedule-list" class="space-y-3">Загрузка...</div>
        <button onclick="changeGroup()" class="mt-6 w-full text-xs text-gray-400 underline">Сменить группу</button>
    </div>

    <div id="tab-teachers" class="tab-content p-4">
        <h1 class="text-xl font-bold mb-4">Преподаватели</h1>
        <div id="teachers-list" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex py-2 px-6 z-50">
        <button onclick="switchMainTab('schedule')" class="flex-1 flex flex-col items-center text-blue-600"
            id="nav-sch">
            <span class="text-xs font-bold">Расписание</span>
        </button>
        <button onclick="switchMainTab('teachers')" class="flex-1 flex flex-col items-center text-gray-400"
            id="nav-tea">
            <span class="text-xs font-bold">Преподаватели</span>
        </button>
    </div>

    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbxN0lVaFLgCw3Ss4kjoaovMcrTQ27LGwWzwenjxGQEFnAlO7ZbGua2TojEWNjVParg/exec';
        let fullData = { schedule: [], teachers: [] };
        let userGroup = localStorage.getItem('userGroup');

        async function init() {
            try {
                const res = await fetch(apiUrl);
                fullData = await res.json();
                if (!userGroup) {
                    showSetup();
                } else {
                    filterSchedule('today');
                }
            } catch (e) {
                document.getElementById('schedule-list').innerHTML = '<p class="text-center text-red-500">Ошибка загрузки данных</p>';
            }
        }

        function showSetup() {
            document.getElementById('setup-screen').classList.remove('hidden');
            const groups = [...new Set(fullData.schedule.map(r => r['Группа']).filter(g => g))];
            document.getElementById('group-list').innerHTML = groups.map(g => `
                <button onclick="saveGroup('${g}')" class="w-full py-4 bg-white rounded-xl shadow-sm border border-gray-200 font-bold text-lg">${g}</button>
            `).join('');
        }

        window.saveGroup = function (group) {
            localStorage.setItem('userGroup', group);
            userGroup = group;
            document.getElementById('setup-screen').classList.add('hidden');
            filterSchedule('today');
        }

        window.changeGroup = function () {
            localStorage.removeItem('userGroup');
            location.reload();
        }

        window.switchMainTab = function (tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
            document.getElementById('nav-sch').className = tab === 'schedule' ? 'flex-1 flex flex-col items-center text-blue-600' : 'flex-1 flex flex-col items-center text-gray-400';
            document.getElementById('nav-tea').className = tab === 'teachers' ? 'flex-1 flex flex-col items-center text-blue-600' : 'flex-1 flex flex-col items-center text-gray-400';
            if (tab === 'teachers') renderTeachers();
        }

        window.filterSchedule = function (mode) {
            document.getElementById('btn-today').className = mode === 'today' ? 'flex-1 py-1 text-sm font-semibold bg-white rounded-md shadow' : 'flex-1 py-1 text-sm font-semibold';
            document.getElementById('btn-week').className = mode === 'week' ? 'flex-1 py-1 text-sm font-semibold bg-white rounded-md shadow' : 'flex-1 py-1 text-sm font-semibold';

            const list = document.getElementById('schedule-list');
            const today = new Date().toLocaleDateString('ru-RU', { weekday: 'long' });

            const data = fullData.schedule.filter(r => {
                const matchGroup = r['Группа'] === userGroup;
                const matchDay = mode === 'today' ? r['День недели']?.trim().toLowerCase() === today.toLowerCase() : true;
                return matchGroup && matchDay;
            });

            list.innerHTML = data.length ? data.map(r => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <p class="font-bold text-gray-800">${r['Предмет'] || '—'}</p>
                    <p class="text-xs text-gray-500">${r['День недели']} • ${r['Время']}</p>
                    <p class="text-xs text-gray-400">Преподаватель: ${r['Преподователь'] || '—'}</p>
                    <p class="text-[10px] text-blue-600 font-bold mt-1">Аудитория: ${r['Аудитория']}</p>
                </div>
            `).join('') : '<p class="text-center text-gray-400 mt-10">Для этой группы пар нет!</p>';
        }

        window.renderTeachers = function () {
            document.getElementById('teachers-list').innerHTML = fullData.teachers.map(t => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-start">
                    <img src="${t['Фото (Ссылка)']}" class="w-16 h-16 rounded-full mr-4 object-cover border" onerror="this.src='https://via.placeholder.com/64'">
                    <div>
                        <p class="font-bold text-gray-800">${t['ФИО']}</p>
                        <p class="text-xs text-gray-500">${t['Кафедра']}</p>
                        <a href="mailto:${t['Почта/Ссылка']}" class="text-xs text-blue-600 font-bold mt-1 block">${t['Почта/Ссылка']}</a>
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>

</html>
