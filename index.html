<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Университетское Приложение</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { padding-bottom: 120px; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-active { display: block; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .task-card { transition: all 0.2s ease; }
        .task-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="font-sans text-gray-900">

    <div id="setup-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6 hidden">
        <div class="max-w-sm w-full text-center">
            <h2 class="text-3xl font-black mb-2 text-gray-800">Привет! 👋</h2>
            <p class="text-gray-500 mb-8 font-medium">Выбери свою группу для начала</p>
            <div id="group-list" class="w-full space-y-3 max-h-[60vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <div id="tab-schedule" class="tab-content tab-active p-4 max-w-2xl mx-auto fade-in">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">Расписание</h1>
            <span id="current-group-badge" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-black uppercase tracking-widest"></span>
        </header>

        <div id="week-indicator-container" class="mb-4"></div>

        <div class="flex bg-gray-200/50 p-1 rounded-2xl mb-6">
            <button onclick="filterSchedule('today')" id="btn-today" class="flex-1 py-3 text-sm font-bold transition-all rounded-xl bg-white shadow-sm text-blue-600">Сегодня</button>
            <button onclick="filterSchedule('week')" id="btn-week" class="flex-1 py-3 text-sm font-bold transition-all text-gray-500">На неделю</button>
        </div>
        
        <div id="schedule-list" class="space-y-4 py-4 text-center text-gray-400 font-medium">Загрузка данных...</div>
        
        <button onclick="changeGroup()" class="mt-12 w-full py-4 bg-white text-red-500 font-bold rounded-2xl border border-red-50 border-b-2 active:scale-95 transition-all shadow-sm">
            Сменить группу
        </button>
    </div>

    <div id="tab-tasks" class="tab-content p-4 max-w-2xl mx-auto fade-in">
        <h1 class="text-2xl font-black mb-6 text-gray-800 tracking-tight">Задания</h1>
        <div id="tasks-list" class="space-y-4"></div>
    </div>

    <div id="tab-teachers" class="tab-content p-4 max-w-2xl mx-auto fade-in">
        <h1 class="text-2xl font-black mb-6 text-gray-800 tracking-tight">Преподаватели</h1>
        <div id="teachers-list" class="space-y-4"></div>
    </div>

    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-gray-100 flex z-50 pb-8 pt-3 px-2 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <button onclick="switchMainTab('schedule')" class="flex-1 flex flex-col items-center gap-1 transition-colors text-blue-600" id="nav-sch">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Расписание</span>
        </button>
        <button onclick="switchMainTab('tasks')" class="flex-1 flex flex-col items-center gap-1 transition-colors text-gray-400" id="nav-tas">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Задания</span>
        </button>
        <button onclick="switchMainTab('teachers')" class="flex-1 flex flex-col items-center gap-1 transition-colors text-gray-400" id="nav-tea">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter text-center">Преподаватели</span>
        </button>
    </nav>

    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbwoneeiEyqWVJYdNWPnyekpeZ23BLR8YLP4M-Ixno9xeewY7FR38RbE6-VW6wzGmikJ/exec';
        let fullData = { schedule: [], teachers: [], tasks: [] };
        let userGroup = localStorage.getItem('userGroup');

        function getWeekType() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            const days = Math.floor((now - start) / (24 * 60 * 60 * 1000));
            const weekNumber = Math.ceil((now.getDay() + 1 + days) / 7);
            return (weekNumber % 2 === 0) ? 'Четная' : 'Нечетная';
        }

        async function init() {
            try {
                const res = await fetch(apiUrl);
                fullData = await res.json();
                if (!userGroup) showSetup(); 
                else {
                    document.getElementById('current-group-badge').innerText = userGroup;
                    filterSchedule('today');
                    renderTasks(); 
                    renderTeachers();
                }
            } catch (e) { console.error(e); }
        }

        function showSetup() {
            const setup = document.getElementById('setup-screen');
            setup.classList.remove('hidden');
            const groups = [...new Set(fullData.schedule.map(r => r['Группа']).filter(g => g))].sort();
            document.getElementById('group-list').innerHTML = groups.map(g => `
                <button onclick="saveGroup('${g}')" class="w-full py-4 bg-white rounded-2xl shadow-sm border border-gray-100 font-bold text-lg active:scale-95 transition-transform">${g}</button>
            `).join('');
        }

        window.saveGroup = (g) => { localStorage.setItem('userGroup', g); location.reload(); }
        window.changeGroup = () => { localStorage.removeItem('userGroup'); location.reload(); }

        window.switchMainTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
            
            const btnMap = { 'schedule': 'nav-sch', 'tasks': 'nav-tas', 'teachers': 'nav-tea' };
            Object.keys(btnMap).forEach(k => {
                const el = document.getElementById(btnMap[k]);
                el.classList.toggle('text-blue-600', k === tab);
                el.classList.toggle('text-gray-400', k !== tab);
            });
            
            if (tab === 'teachers') renderTeachers();
            if (tab === 'tasks') renderTasks();
            if (tab === 'schedule') filterSchedule('today');
        }

        window.filterSchedule = (mode) => {
            const btnT = document.getElementById('btn-today');
            const btnW = document.getElementById('btn-week');
            btnT.className = mode === 'today' ? 'flex-1 py-3 text-sm font-bold bg-white rounded-xl shadow-sm text-blue-600 transition-all' : 'flex-1 py-3 text-sm font-bold text-gray-500 transition-all';
            btnW.className = mode === 'week' ? 'flex-1 py-3 text-sm font-bold bg-white rounded-xl shadow-sm text-blue-600 transition-all' : 'flex-1 py-3 text-sm font-bold text-gray-500 transition-all';

            const list = document.getElementById('schedule-list');
            const today = new Date().toLocaleDateString('ru-RU', { weekday: 'long' });
            const currentWeekType = getWeekType();

            document.getElementById('week-indicator-container').innerHTML = `
                <div class="inline-block px-4 py-1.5 bg-blue-50 text-blue-600 rounded-full font-black text-[10px] uppercase tracking-widest leading-none border border-blue-100">
                    ${currentWeekType} неделя
                </div>`;

            let data = fullData.schedule.filter(r => {
                const matchGroup = r['Группа'] === userGroup;
                const matchDay = mode === 'today' ? r['День недели']?.trim().toLowerCase() === today.toLowerCase() : true;
                const matchWeek = (r['Неделя'] || '').trim() === "Любая" || (r['Неделя'] || '').trim() === currentWeekType;
                return matchGroup && matchDay && matchWeek;
            });

            if (!data.length) { 
                list.innerHTML = `<div class="mt-10 py-10"><p class="text-4xl mb-4 text-gray-200">✨</p><p class="text-gray-400 font-bold">На сегодня пар нет!</p></div>`; 
                return; 
            }

            const grouped = data.reduce((acc, curr) => {
                const day = curr['День недели'];
                if (!acc[day]) acc[day] = [];
                acc[day].push(curr);
                return acc;
            }, {});

            list.innerHTML = Object.keys(grouped).map(day => `
                <div class="text-left mb-8 last:mb-0">
                    <h3 class="text-gray-400 font-black mb-3 uppercase text-[10px] tracking-widest ml-1">${day}</h3>
                    ${grouped[day].map(r => `
                        <div class="bg-white p-5 mb-3 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                            <div class="flex justify-between items-start mb-2">
                                <p class="font-bold text-gray-800 leading-tight flex-1 pr-4">${r['Предмет']}</p>
                                <span class="text-[10px] font-black text-gray-300 bg-gray-50 px-2 py-1 rounded-md uppercase">${r['Аудитория'] || '—'}</span>
                            </div>
                            <div class="flex items-center text-xs text-gray-500 font-semibold gap-2">
                                <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-lg">${r['Время']}</span>
                                <span class="truncate">${r['Преподователь'] || ''}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        window.renderTasks = () => {
            const container = document.getElementById('tasks-list');
            if (!fullData.tasks?.length) {
                container.innerHTML = `<div class="py-20 text-center text-gray-400 font-bold">Заданий нет 🎉</div>`;
                return;
            }

            const now = new Date();
            now.setHours(0, 0, 0, 0);

            container.innerHTML = fullData.tasks.map(t => {
                const rawDate = t['Срок'];
                let dDate = null;

                if (rawDate instanceof Date || !isNaN(Date.parse(rawDate))) {
                    dDate = new Date(rawDate);
                } else if (typeof rawDate === 'string' && rawDate.includes('.')) {
                    const p = rawDate.split('.');
                    dDate = new Date(p[2], p[1] - 1, p[0]);
                }

                const isPast = dDate && dDate < now;
                const dateDisplay = dDate ? dDate.toLocaleDateString('ru-RU') : rawDate;

                return `
                <div class="task-card bg-white p-5 rounded-3xl border ${isPast ? 'border-gray-100 opacity-60' : 'border-blue-50 shadow-sm'} text-left flex flex-col gap-1 relative overflow-hidden mb-4">
                    <div class="absolute top-0 right-0 px-4 py-2 ${isPast ? 'bg-gray-100 text-gray-500' : 'bg-orange-50 text-orange-600'} text-center min-w-[100px] border-l border-b border-gray-50">
                        <p class="text-[9px] font-black uppercase leading-none mb-1">${isPast ? 'Прошло' : 'Дедлайн'}</p>
                        <p class="text-sm font-black leading-none">${dateDisplay}</p>
                    </div>
                    <p class="text-[10px] font-black ${isPast ? 'text-gray-400' : 'text-blue-500'} uppercase tracking-widest leading-none mb-1">
                        ${t['Предмет'] || 'ОБЩЕЕ'}
                    </p>
                    <p class="font-bold text-gray-800 leading-snug pr-24 text-lg">
                        ${t['Задание']}
                    </p>
                    ${!isPast ? `
                        <div class="mt-2 flex items-center gap-1.5">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <span class="text-[10px] font-bold text-green-600 uppercase">Актуально</span>
                        </div>` : ''}
                </div>`;
            }).join('');
        }

        window.renderTeachers = () => {
            const container = document.getElementById('teachers-list');
            if (!fullData.teachers?.length) {
                container.innerHTML = '<p class="text-center py-10 text-gray-400">Список пуст</p>';
                return;
            }
            container.innerHTML = fullData.teachers.map(t => {
                const info = Object.entries(t).filter(([k]) => !['ФИО','Кафедра','Фото (Ссылка)','Фото'].includes(k) && t[k]);
                return `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex gap-5 items-start mb-4">
                    <img src="${t['Фото (Ссылка)'] || t['Фото'] || ''}" class="w-20 h-20 rounded-2xl object-cover bg-gray-50 shadow-inner flex-shrink-0" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(t['ФИО'])}&background=random'">
                    <div class="flex-1 min-w-0">
                        <p class="font-black text-gray-900 leading-tight text-lg mb-0.5">${t['ФИО']}</p>
                        <p class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">${t['Кафедра']}</p>
                        <div class="space-y-1">
                            ${info.map(([k,v]) => `<p class="text-[11px] text-gray-600"><b>${k}:</b> ${v}</p>`).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        init();
    </script>
</body>
</html>
