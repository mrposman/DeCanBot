<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Университетское Приложение</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-active { display: block; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .nav-shadow { shadow-[0_-4px_20px_rgba(0,0,0,0.03)]; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div id="setup-screen" class="fixed inset-0 bg-gray-50 z-[100] flex flex-col items-center justify-center p-6 hidden">
        <div class="max-w-sm w-full text-center">
            <h2 class="text-3xl font-black mb-2 text-gray-800">Привет! 👋</h2>
            <p class="text-gray-500 mb-8">Выбери свою группу</p>
            <div id="group-list" class="w-full space-y-3 max-h-[60vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <div id="tab-schedule" class="tab-content tab-active p-4 max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-gray-800">Расписание</h1>
            <span id="current-group-badge" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold uppercase tracking-wider"></span>
        </header>

        <div class="flex bg-gray-200/50 p-1 rounded-xl mb-6">
            <button onclick="filterSchedule('today')" id="btn-today" class="flex-1 py-2.5 text-sm font-bold transition-all rounded-lg">Сегодня</button>
            <button onclick="filterSchedule('week')" id="btn-week" class="flex-1 py-2.5 text-sm font-bold transition-all">На неделю</button>
        </div>
        
        <div id="schedule-list" class="space-y-4 py-4 text-center text-gray-400">Загрузка данных...</div>
        
        <button onclick="changeGroup()" class="mt-12 w-full py-4 bg-white text-red-500 font-bold rounded-2xl border border-red-100 shadow-sm active:scale-95 transition-all">
            Сменить группу
        </button>
    </div>

    <div id="tab-tasks" class="tab-content p-4 max-w-2xl mx-auto">
        <h1 class="text-2xl font-black mb-6 text-gray-800">Задания</h1>
        
        <div id="tasks-list" class="space-y-4">
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between opacity-60">
                <div>
                    <p class="font-bold text-gray-800 italic">Здесь будут ваши задания...</p>
                    <p class="text-xs text-gray-400 mt-1">Функционал в разработке</p>
                </div>
                <div class="h-10 w-10 bg-gray-50 rounded-full flex items-center justify-center">⏳</div>
            </div>
        </div>
    </div>

    <div id="tab-teachers" class="tab-content p-4 max-w-2xl mx-auto">
        <h1 class="text-2xl font-black mb-6 text-gray-800">Преподаватели</h1>
        <div id="teachers-list" class="space-y-4"></div>
    </div>

    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-gray-100 flex z-50 pb-6 pt-3 px-2">
        <button onclick="switchMainTab('schedule')" class="flex-1 flex flex-col items-center gap-1 transition-colors text-blue-600" id="nav-sch">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Расписание</span>
        </button>
        
        <button onclick="switchMainTab('tasks')" class="flex-1 flex flex-col items-center gap-1 transition-colors text-gray-400" id="nav-tas">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Задания</span>
        </button>

        <button onclick="switchMainTab('teachers')" class="flex-1 flex flex-col items-center gap-1 transition-colors text-gray-400" id="nav-tea">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter text-center">Преподаватели</span>
        </button>
    </nav>

    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbxN0lVaFLgCw3Ss4kjoaovMcrTQ27LGwWzwenjxGQEFnAlO7ZbGua2TojEWNjVParg/exec';
        let fullData = { schedule: [], teachers: [] };
        let userGroup = localStorage.getItem('userGroup');

        function getWeekType() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            const days = Math.floor((now - start) / (24 * 60 * 60 * 1000));
            const weekNumber = Math.ceil((now.getDay() + 1 + days) / 7);
            return (weekNumber % 2 === 0) ? 'Четная' : 'Нечетная';
        }

        async function init() {
            try {
                const res = await fetch(apiUrl);
                fullData = await res.json();
                if (!userGroup) {
                    showSetup();
                } else {
                    document.getElementById('current-group-badge').innerText = userGroup;
                    filterSchedule('today');
                }
            } catch (e) {
                document.getElementById('schedule-list').innerHTML = '<p class="text-red-500 text-sm">Ошибка загрузки данных</p>';
            }
        }

        function showSetup() {
            document.getElementById('setup-screen').classList.remove('hidden');
            const groups = [...new Set(fullData.schedule.map(r => r['Группа']).filter(g => g))].sort();
            document.getElementById('group-list').innerHTML = groups.map(g => `
                <button onclick="saveGroup('${g}')" class="w-full py-4 bg-white rounded-2xl shadow-sm border border-gray-100 font-bold text-lg active:scale-95 transition-transform">${g}</button>
            `).join('');
        }

        window.saveGroup = (g) => { 
            localStorage.setItem('userGroup', g); 
            userGroup = g; 
            location.reload(); 
        }

        window.changeGroup = () => { 
            localStorage.removeItem('userGroup'); 
            location.reload(); 
        }

        window.switchMainTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
            
            // Сброс цвета иконок
            const tabs = {
                'schedule': 'nav-sch',
                'tasks': 'nav-tas',
                'teachers': 'nav-tea'
            };

            Object.keys(tabs).forEach(key => {
                const el = document.getElementById(tabs[key]);
                if(key === tab) {
                    el.classList.add('text-blue-600');
                    el.classList.remove('text-gray-400');
                } else {
                    el.classList.remove('text-blue-600');
                    el.classList.add('text-gray-400');
                }
            });
            
            if (tab === 'teachers') renderTeachers();
        }

        window.filterSchedule = (mode) => {
            const btnT = document.getElementById('btn-today');
            const btnW = document.getElementById('btn-week');
            btnT.className = mode === 'today' ? 'flex-1 py-2.5 text-sm font-bold bg-white rounded-lg shadow-sm text-blue-600' : 'flex-1 py-2.5 text-sm font-bold text-gray-500';
            btnW.className = mode === 'week' ? 'flex-1 py-2.5 text-sm font-bold bg-white rounded-lg shadow-sm text-blue-600' : 'flex-1 py-2.5 text-sm font-bold text-gray-500';

            const list = document.getElementById('schedule-list');
            const today = new Date().toLocaleDateString('ru-RU', { weekday: 'long' });
            const currentWeekType = getWeekType();

            const header = `<div class="inline-block px-4 py-1.5 mb-6 bg-blue-50 text-blue-600 rounded-full font-bold text-[10px] uppercase tracking-widest leading-none border border-blue-100">
                ${currentWeekType} неделя
            </div>`;

            let data = fullData.schedule.filter(r => {
                const matchGroup = r['Группа'] === userGroup;
                const matchDay = mode === 'today' ? r['День недели']?.trim().toLowerCase() === today.toLowerCase() : true;
                const matchWeek = (r['Неделя'] || '').trim() === "Любая" || (r['Неделя'] || '').trim() === currentWeekType;
                return matchGroup && matchDay && matchWeek;
            });

            if (data.length === 0) {
                list.innerHTML = header + `<div class="mt-10 py-10"><p class="text-3xl mb-2 text-gray-300">☕️</p><p class="text-gray-400 font-medium">Пар нет, можно отдыхать</p></div>`;
                return;
            }

            const grouped = data.reduce((acc, curr) => {
                const day = curr['День недели'];
                if (!acc[day]) acc[day] = [];
                acc[day].push(curr);
                return acc;
            }, {});

            list.innerHTML = header + Object.keys(grouped).map(day => `
                <div class="text-left mb-8 last:mb-0">
                    <h3 class="text-gray-400 font-black mb-3 uppercase text-[10px] tracking-[0.2em] ml-1">${day}</h3>
                    ${grouped[day].map(r => `
                        <div class="bg-white p-5 mb-3 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden transition-all active:bg-gray-50">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                            <div class="flex justify-between items-start mb-1">
                                <p class="font-bold text-gray-800 leading-tight flex-1">${r['Предмет']}</p>
                                <span class="text-[10px] font-black text-gray-300 ml-4">${r['Аудитория']}</span>
                            </div>
                            <div class="flex items-center text-xs text-gray-500 font-medium gap-2">
                                <span>${r['Время']}</span>
                                <span class="w-1.5 h-1.5 bg-gray-100 rounded-full"></span>
                                <span class="text-blue-500/80">${r['Преподователь']}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        window.renderTeachers = () => {
            const container = document.getElementById('teachers-list');
            if (!fullData.teachers.length) {
                container.innerHTML = '<p class="text-center text-gray-400">Нет данных о преподавателях</p>';
                return;
            }

            container.innerHTML = fullData.teachers.map(t => {
                const infoEntries = Object.entries(t).filter(([k, v]) => 
                    !['ФИО', 'Кафедра', 'Фото (Ссылка)', 'Фото'].includes(k) && v
                );

                return `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex gap-5 items-start transition-all active:scale-[0.98]">
                    <img src="${t['Фото (Ссылка)'] || t['Фото'] || ''}" 
                         class="w-20 h-20 rounded-2xl object-cover bg-gray-100 shadow-inner flex-shrink-0"
                         onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(t['ФИО'])}&background=random&size=128'">
                    <div class="flex-1 min-w-0">
                        <p class="font-black text-gray-900 leading-tight text-lg mb-0.5">${t['ФИО']}</p>
                        <p class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-3">${t['Кафедра']}</p>
                        
                        <div class="space-y-2.5 border-t border-gray-50 pt-3">
                            ${infoEntries.map(([key, val]) => `
                                <div>
                                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-tight">${key}</p>
                                    <p class="text-xs text-gray-700 font-semibold leading-tight">${val}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        init();
    </script>
</body>
</html>
