<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-active { display: block; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div id="setup-screen" class="fixed inset-0 bg-gray-50 z-[100] flex flex-col items-center justify-center p-6 hidden">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Выберите вашу группу</h2>
        <div id="group-list" class="w-full space-y-3"></div>
    </div>

    <div id="tab-schedule" class="tab-content tab-active p-4">
        <h1 class="text-xl font-bold mb-4">Расписание</h1>
        <div class="flex bg-gray-200 p-1 rounded-lg mb-4">
            <button onclick="filterSchedule('today')" id="btn-today" class="flex-1 py-2 text-sm font-semibold bg-white rounded-md shadow">Сегодня</button>
            <button onclick="filterSchedule('week')" id="btn-week" class="flex-1 py-2 text-sm font-semibold">На неделю</button>
        </div>
        
        <div id="schedule-list" class="space-y-4">Загрузка...</div>
        
        <button onclick="changeGroup()" class="mt-10 w-full py-3 bg-red-100 text-red-600 font-bold rounded-xl border border-red-200 active:scale-95 transition-transform">
            Сменить группу
        </button>
    </div>

    <div id="tab-teachers" class="tab-content p-4">
        <h1 class="text-xl font-bold mb-4">Преподаватели</h1>
        <div id="teachers-list" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button onclick="switchMainTab('schedule')" class="flex-1 py-4 flex flex-col items-center text-blue-600" id="nav-sch">
            <span class="text-sm font-bold">Расписание</span>
        </button>
        <button onclick="switchMainTab('teachers')" class="flex-1 py-4 flex flex-col items-center text-gray-400" id="nav-tea">
            <span class="text-sm font-bold">Преподаватели</span>
        </button>
    </div>

    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbxN0lVaFLgCw3Ss4kjoaovMcrTQ27LGwWzwenjxGQEFnAlO7ZbGua2TojEWNjVParg/exec';
        let fullData = { schedule: [], teachers: [] };
        let userGroup = localStorage.getItem('userGroup');

        // Функция определения недели
        function getWeekType() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            const days = Math.floor((now - start) / (24 * 60 * 60 * 1000));
            const weekNumber = Math.ceil((now.getDay() + 1 + days) / 7);
            return (weekNumber % 2 === 0) ? 'Четная' : 'Нечетная';
        }

        async function init() {
            try {
                const res = await fetch(apiUrl);
                fullData = await res.json();
                if (!userGroup) showSetup(); else filterSchedule('today');
            } catch (e) {
                document.getElementById('schedule-list').innerHTML = '<p class="text-center text-red-500">Ошибка загрузки</p>';
            }
        }

        function showSetup() {
            document.getElementById('setup-screen').classList.remove('hidden');
            const groups = [...new Set(fullData.schedule.map(r => r['Группа']).filter(g => g))];
            document.getElementById('group-list').innerHTML = groups.map(g => `
                <button onclick="saveGroup('${g}')" class="w-full py-4 bg-white rounded-xl shadow-md border border-gray-100 font-bold text-lg">${g}</button>
            `).join('');
        }

        window.saveGroup = (g) => { localStorage.setItem('userGroup', g); userGroup = g; document.getElementById('setup-screen').classList.add('hidden'); filterSchedule('today'); }
        window.changeGroup = () => { localStorage.removeItem('userGroup'); location.reload(); }

        window.switchMainTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
            document.getElementById('nav-sch').className = tab === 'schedule' ? 'flex-1 py-4 flex flex-col items-center text-blue-600' : 'flex-1 py-4 flex flex-col items-center text-gray-400';
            document.getElementById('nav-tea').className = tab === 'teachers' ? 'flex-1 py-4 flex flex-col items-center text-blue-600' : 'flex-1 py-4 flex flex-col items-center text-gray-400';
            if (tab === 'teachers') renderTeachers();
        }

        window.filterSchedule = (mode) => {
            document.getElementById('btn-today').className = mode === 'today' ? 'flex-1 py-2 text-sm font-semibold bg-white rounded-md shadow' : 'flex-1 py-2 text-sm font-semibold';
            document.getElementById('btn-week').className = mode === 'week' ? 'flex-1 py-2 text-sm font-semibold bg-white rounded-md shadow' : 'flex-1 py-2 text-sm font-semibold';

            const list = document.getElementById('schedule-list');
            const today = new Date().toLocaleDateString('ru-RU', { weekday: 'long' });
            const currentWeekType = getWeekType();

            // Индикатор недели
            const header = `<div class="text-center py-2 mb-2 bg-blue-100 rounded-lg text-blue-800 font-bold text-sm">
                Текущая неделя: ${currentWeekType}
            </div>`;

            // Фильтр: Группа + (если today) День + Неделя
            let data = fullData.schedule.filter(r => {
                const matchGroup = r['Группа'] === userGroup;
                const matchDay = mode === 'today' ? r['День недели']?.trim().toLowerCase() === today.toLowerCase() : true;
                const matchWeek = (r['Неделя'] || '').trim() === "Любая" || (r['Неделя'] || '').trim() === currentWeekType;
                return matchGroup && matchDay && matchWeek;
            });

            if (data.length === 0) {
                list.innerHTML = header + '<p class="text-center text-gray-400 mt-10">Пар нет!</p>';
                return;
            }

            const grouped = data.reduce((acc, curr) => {
                const day = curr['День недели'];
                if (!acc[day]) acc[day] = [];
                acc[day].push(curr);
                return acc;
            }, {});

            list.innerHTML = header + Object.keys(grouped).map(day => `
                <div class="mt-4">
                    <h3 class="text-blue-900 font-bold mb-2 uppercase text-xs tracking-wider">${day}</h3>
                    ${grouped[day].map(r => `
                        <div class="bg-white p-4 mb-2 rounded-xl shadow-sm border-l-4 border-blue-500">
                            <p class="font-bold text-gray-800">${r['Предмет']}</p>
                            <p class="text-xs text-gray-500">${r['Время']} • Ауд: ${r['Аудитория']}</p>
                            <p class="text-xs text-blue-600 font-medium">Препод: ${r['Преподователь']}</p>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        window.renderTeachers = () => {
            document.getElementById('teachers-list').innerHTML = fullData.teachers.map(t => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center">
                    <img src="${t['Фото (Ссылка)']}" class="w-12 h-12 rounded-full mr-4 object-cover" onerror="this.src='https://via.placeholder.com/64'">
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${t['ФИО']}</p>
                        <p class="text-[10px] text-gray-400 uppercase font-bold">${t['Кафедра']}</p>
                    </div>
                </div>
            `).join('');
        }
        init();
    </script>
</body>
</html>
</html>
